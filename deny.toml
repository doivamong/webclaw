# cargo-deny configuration for webclaw (AGPL-3.0 workspace).
# Docs: https://embarkstudios.github.io/cargo-deny/
# Enforced by wc-pre-commit C6; spec: .claude/skills/wc-deps-audit/SKILL.md.

[graph]
all-features = false
no-default-features = false

[output]
feature-depth = 1

[advisories]
yanked = "warn"
ignore = [
    # fxhash is unmaintained; pulled in transitively via scraper → selectors.
    # No safe upgrade path available upstream. Track scraper's migration to
    # rustc-hash before removing this exception.
    { id = "RUSTSEC-2025-0057", reason = "fxhash transitive via scraper; no safe upgrade" },
]

[licenses]
# Workspace license is AGPL-3.0. Allow list limited to licenses compatible
# with AGPL-3.0 (permissive + weak copyleft + same-license).
# Compatibility matrix: .claude/skills/wc-deps-audit/SKILL.md § License check.
confidence-threshold = 0.93
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "0BSD",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CDLA-Permissive-2.0",
    "MPL-2.0",
    "AGPL-3.0",
]
exceptions = []

[licenses.private]
ignore = false
registries = []

[bans]
multiple-versions = "warn"
# Downgraded from "deny" (wc-deps-audit SKILL.md spec) until workspace.dependencies
# in root Cargo.toml declare explicit `version = "0.3.4"` alongside `path = ...`.
# Currently webclaw-cli/fetch/mcp inherit path-only deps via `{ workspace = true }`,
# which cargo-deny treats as wildcards for publishable crates. Restore to "deny"
# once workspace deps carry versions (tracked as publish-hygiene TODO).
wildcards = "warn"
allow-wildcard-paths = true
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
allow-workspace = false
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = []
gitlab = []
bitbucket = []
